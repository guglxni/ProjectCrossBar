# Project CrossBar Anchor workspace.
#
# Toolchain: Anchor 1.0.2 + ephemeral-rollups-sdk 0.14.x (see README.md).
# Build with platform-tools v1.53: cargo build-sbf --tools-version v1.53
[toolchain]
anchor_version = "1.0.2"

[features]
resolution = true
skip-lint = false

[programs.localnet]
crossbar = "CG4brtfmRvvHLGEfLazSmrTWeUJsDvyKYfosx2Abbzbd"

[programs.devnet]
crossbar = "CG4brtfmRvvHLGEfLazSmrTWeUJsDvyKYfosx2Abbzbd"

[registry]
url = "https://api.apr.dev"

[provider]
# Target devnet (mainnet out of scope for this release).
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
